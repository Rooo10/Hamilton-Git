<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hamilton Deco · Caja</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF7F2;
    --warm-white: #FFFFFF;
    --charcoal: #1C1C1E;
    --dark: #2C2C2E;
    --mid: #6C6C70;
    --light: #AEAEB2;
    --border: #E5E0D8;
    --gold: #B8860B;
    --gold-light: #D4A017;
    --green: #2E7D52;
    --green-light: #E8F5EE;
    --red: #C0392B;
    --red-light: #FDECEA;
    --blue: #1A4A7A;
    --blue-light: #EAF0F8;
    --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 20px rgba(0,0,0,0.10);
    --shadow-lg: 0 8px 40px rgba(0,0,0,0.14);
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--charcoal);
    min-height: 100vh;
    padding-bottom: 40px;
  }

  /* HEADER */
  header {
    background: var(--charcoal);
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow-md);
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    color: var(--cream);
    font-size: 22px;
    letter-spacing: 0.5px;
  }
  header span {
    font-family: 'DM Sans', sans-serif;
    color: var(--gold-light);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  #clock {
    color: var(--light);
    font-size: 13px;
    font-weight: 300;
  }

  /* LAYOUT */
  .container { max-width: 820px; margin: 0 auto; padding: 24px 16px; }

  /* SECTION CARD */
  .card {
    background: var(--warm-white);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--border);
  }
  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    color: var(--dark);
    margin-bottom: 18px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title .icon {
    width: 28px; height: 28px;
    background: var(--cream);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }

  /* FORM ELEMENTS */
  .field { margin-bottom: 14px; }
  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--mid);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 6px;
  }
  input[type="text"], input[type="email"], input[type="tel"], input[type="number"], select {
    width: 100%;
    padding: 13px 16px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    color: var(--charcoal);
    background: var(--cream);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
  }
  input:focus, select:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(184,134,11,0.12);
    background: white;
  }
  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* PAYMENT METHODS */
  .payment-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }
  .pay-btn {
    padding: 14px 10px;
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--mid);
    cursor: pointer;
    text-align: center;
    transition: all 0.18s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    line-height: 1.2;
  }
  .pay-btn .pay-icon { font-size: 20px; }
  .pay-btn:active { transform: scale(0.97); }
  .pay-btn.selected {
    border-color: var(--gold);
    background: #FDF8EE;
    color: var(--gold);
    box-shadow: 0 0 0 3px rgba(184,134,11,0.10);
  }

  /* CUOTAS */
  #cuotas-section {
    margin-top: 12px;
    display: none;
    animation: fadeIn 0.2s ease;
  }
  #cuotas-section.visible { display: block; }

  /* FACTURA TOGGLE */
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    background: var(--cream);
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--border);
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .toggle-row.active { border-color: var(--gold); background: #FDF8EE; }
  .toggle-label { font-size: 15px; font-weight: 500; }
  .toggle-switch {
    width: 48px; height: 28px;
    background: var(--light);
    border-radius: 20px;
    position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .toggle-switch::after {
    content: '';
    position: absolute;
    width: 22px; height: 22px;
    background: white;
    border-radius: 50%;
    top: 3px; left: 3px;
    transition: transform 0.2s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }
  .toggle-row.active .toggle-switch { background: var(--gold); }
  .toggle-row.active .toggle-switch::after { transform: translateX(20px); }

  #factura-fields {
    display: none;
    margin-top: 12px;
    animation: fadeIn 0.2s ease;
  }
  #factura-fields.visible { display: block; }

  /* ITEMS */
  .item-row {
    display: grid;
    grid-template-columns: 50px 1fr 90px 90px 36px;
    gap: 8px;
    align-items: center;
    margin-bottom: 10px;
    animation: fadeIn 0.2s ease;
  }
  .item-row input {
    padding: 11px 10px;
    font-size: 15px;
  }
  .btn-remove {
    width: 36px; height: 36px;
    border: none;
    background: var(--red-light);
    color: var(--red);
    border-radius: 8px;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .btn-remove:active { background: #f5c6c2; }

  .items-header {
    display: grid;
    grid-template-columns: 50px 1fr 90px 90px 36px;
    gap: 8px;
    margin-bottom: 8px;
  }
  .items-header span {
    font-size: 11px;
    font-weight: 600;
    color: var(--light);
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }

  .btn-add-item {
    width: 100%;
    padding: 12px;
    border: 2px dashed var(--border);
    border-radius: var(--radius-sm);
    background: transparent;
    color: var(--mid);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 4px;
    transition: all 0.15s;
  }
  .btn-add-item:active { border-color: var(--gold); color: var(--gold); }

  /* TOTAL */
  .total-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--charcoal);
    border-radius: var(--radius-sm);
    padding: 18px 20px;
    margin-top: 4px;
  }
  .total-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--light);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .total-amount {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    color: var(--gold-light);
  }

  /* SUBMIT */
  .btn-submit {
    width: 100%;
    padding: 20px;
    background: var(--charcoal);
    color: var(--cream);
    border: none;
    border-radius: var(--radius);
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    letter-spacing: 0.5px;
    cursor: pointer;
    margin-top: 8px;
    box-shadow: var(--shadow-md);
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .btn-submit:active { transform: scale(0.99); box-shadow: var(--shadow-sm); }
  .btn-submit.loading { opacity: 0.7; pointer-events: none; }
  .btn-submit .btn-sub { display: block; font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--gold-light); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }

  /* SUCCESS MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 999;
    padding: 20px;
  }
  .modal-overlay.visible { display: flex; }
  .modal {
    background: white;
    border-radius: var(--radius);
    padding: 40px 32px;
    text-align: center;
    max-width: 360px;
    width: 100%;
    box-shadow: var(--shadow-lg);
    animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .modal .check { font-size: 56px; margin-bottom: 16px; }
  .modal h2 { font-family: 'Playfair Display', serif; font-size: 24px; margin-bottom: 8px; }
  .modal p { color: var(--mid); font-size: 15px; margin-bottom: 8px; }
  .modal .id-venta { font-size: 13px; color: var(--light); font-weight: 500; margin-bottom: 24px; }
  .btn-nueva {
    width: 100%;
    padding: 16px;
    background: var(--charcoal);
    color: var(--cream);
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
  }

  /* ANIMATIONS */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pop
